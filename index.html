<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サイバー・エスケープ</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        #game-info {
            width: 400px;
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        canvas {
            border: 2px solid #0f0;
            background: #050505;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            max-width: 95vw;
        }

        .msg {
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="game-info">
        <div>SCORE: <span id="score">0</span></div>
        <div>BEST: <span id="best">0</span></div>
    </div>

    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <div class="msg">
        クリック（またはスペースキー）で上昇！<br>
        障害物を避けて進め！
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');

        // ゲーム状態
        let score = 0;
        let best = 0;
        let gameActive = false;

        // プレイヤー設定
        const player = {
            x: 50,
            y: 250,
            width: 30,
            height: 20,
            gravity: 0.25,
            lift: -6,
            velocity: 0
        };

        // 障害物の設定
        let obstacles = [];
        const obsWidth = 50;
        const obsGap = 150; // 通過できる隙間

        function resetGame() {
            score = 0;
            player.y = 250;
            player.velocity = 0;
            obstacles = [];
            gameActive = true;
            scoreEl.innerText = score;
        }

        function spawnObstacle() {
            const minHeight = 50;
            const maxHeight = canvas.height - obsGap - minHeight;
            const topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
            
            obstacles.push({
                x: canvas.width,
                top: topHeight,
                passed: false
            });
        }

        function update() {
            if (!gameActive) return;

            // プレイヤー物理計算
            player.velocity += player.gravity;
            player.y += player.velocity;

            // 天井と床の判定
            if (player.y > canvas.height - player.height || player.y < 0) {
                gameOver();
            }

            // 障害物の移動と判定
            if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < canvas.width - 200) {
                spawnObstacle();
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i];
                o.x -= 3; // スピード

                // 衝突判定
                if (
                    player.x < o.x + obsWidth &&
                    player.x + player.width > o.x &&
                    (player.y < o.top || player.y + player.height > o.top + obsGap)
                ) {
                    gameOver();
                }

                // スコア加算
                if (!o.passed && o.x + obsWidth < player.x) {
                    o.passed = true;
                    score++;
                    scoreEl.innerText = score;
                }

                // 画面外に出た障害物を削除
                if (o.x < -obsWidth) {
                    obstacles.splice(i, 1);
                }
            }
        }

        function draw() {
            // 背景クリア
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // プレイヤー描画
            ctx.fillStyle = '#0f0';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#0f0';
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // 障害物描画
            ctx.fillStyle = '#0a0';
            ctx.shadowBlur = 0;
            obstacles.forEach(o => {
                // 上の柱
                ctx.fillRect(o.x, 0, obsWidth, o.top);
                // 下の柱
                ctx.fillRect(o.x, o.top + obsGap, obsWidth, canvas.height - (o.top + obsGap));
            });

            if (!gameActive) {
                ctx.fillStyle = 'rgba(0, 255, 0, 0.8)';
                ctx.font = '24px "Courier New"';
                ctx.textAlign = 'center';
                ctx.fillText('CLICK TO START', canvas.width / 2, canvas.height / 2);
            }
        }

        function gameOver() {
            gameActive = false;
            if (score > best) {
                best = score;
                bestEl.innerText = best;
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // 入力処理
        function handleAction() {
            if (!gameActive) {
                resetGame();
            } else {
                player.velocity = player.lift;
            }
        }

        window.addEventListener('mousedown', handleAction);
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') handleAction();
        });

        loop();
    </script>
</body>
</html>
