<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ランダム・リズム・アクション</title>
    <style>
        :root {
            --bg-color: #050505;
            --target-color: #00ffcc;
            --accent-color: #ff00ff;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Courier New', Courier, monospace;
            color: var(--text-color);
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        /* ゲームのメインステージ（この範囲内にランダムで出現） */
        #game-stage {
            position: relative;
            width: 90vw;
            height: 70vh;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            overflow: hidden;
        }

        #ui-layer {
            width: 90vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .stats {
            font-size: 1.2rem;
            font-weight: bold;
        }

        #judge-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            font-weight: 900;
            pointer-events: none;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.1s;
        }

        /* 動くターゲット */
        #target-container {
            position: absolute;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transform: translate(-50%, -50%); /* 中心合わせ */
        }

        #target-core {
            width: 40px;
            height: 40px;
            background-color: var(--target-color);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--target-color);
            z-index: 5;
        }

        .ring {
            position: absolute;
            border: 2px solid var(--text-color);
            border-radius: 50%;
            pointer-events: none;
        }

        #combo-info {
            color: var(--accent-color);
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="stats" id="score-display">SCORE: 0</div>
        <div id="combo-info"></div>
        <div class="stats" id="level-display">LEVEL: 1</div>
    </div>

    <div id="game-stage" id="stage">
        <div id="judge-overlay">PERFECT</div>
        <div id="target-container" style="display: none;">
            <div id="target-core"></div>
        </div>
    </div>

    <p style="margin-top: 15px; opacity: 0.6;">出現するターゲットを素早くクリック！</p>

    <script>
        const stage = document.getElementById('game-stage');
        const targetContainer = document.getElementById('target-container');
        const scoreEl = document.getElementById('score-display');
        const levelEl = document.getElementById('level-display');
        const comboEl = document.getElementById('combo-info');
        const judgeEl = document.getElementById('judge-overlay');

        let score = 0;
        let combo = 0;
        let level = 1;
        let ringScale = 4.0;
        let animationId = null;
        let currentRing = null;
        
        const BASE_SPEED = 0.03;
        const SPEED_INC = 0.003;

        // ランダムな位置にターゲットを移動
        function moveTarget() {
            const margin = 100; // 端に寄りすぎないためのマージン
            const maxX = stage.clientWidth - margin;
            const maxY = stage.clientHeight - margin;
            
            const randomX = Math.floor(Math.random() * (maxX - margin)) + margin;
            const randomY = Math.floor(Math.random() * (maxY - margin)) + margin;

            targetContainer.style.left = `${randomX}px`;
            targetContainer.style.top = `${randomY}px`;
            targetContainer.style.display = 'flex';
        }

        function spawnNext() {
            resetRing();
            moveTarget();
            ringScale = 4.0;
            
            const ring = document.createElement('div');
            ring.className = 'ring';
            targetContainer.appendChild(ring);
            currentRing = ring;
            
            animate();
        }

        function animate() {
            if (!currentRing) return;

            const speed = BASE_SPEED + (level * SPEED_INC);
            ringScale -= speed;

            const size = 40 * ringScale; // コアのサイズ(40)基準
            currentRing.style.width = size + 'px';
            currentRing.style.height = size + 'px';

            if (ringScale <= 0.8) {
                showJudge("MISS", "#ff4757");
                combo = 0;
                updateUI();
                setTimeout(spawnNext, 500);
            } else {
                animationId = requestAnimationFrame(animate);
            }
        }

        function handleInput(e) {
            if (!currentRing) return;
            e.stopPropagation();

            cancelAnimationFrame(animationId);
            const diff = Math.abs(ringScale - 1.0);

            if (diff < 0.15) {
                score += 100 + (combo * 10);
                combo++;
                showJudge("PERFECT", "#00ffcc");
            } else if (diff < 0.4) {
                score += 50;
                combo++;
                showJudge("GREAT", "#f1c40f");
            } else {
                combo = 0;
                showJudge("EARLY", "#95a5a6");
            }

            level = Math.floor(score / 1000) + 1;
            updateUI();
            setTimeout(spawnNext, 150);
        }

        function resetRing() {
            if (currentRing) {
                currentRing.remove();
                currentRing = null;
            }
        }

        function showJudge(text, color) {
            judgeEl.innerText = text;
            judgeEl.style.color = color;
            judgeEl.style.opacity = 1;
            setTimeout(() => { judgeEl.style.opacity = 0; }, 400);
        }

        function updateUI() {
            scoreEl.innerText = `SCORE: ${score}`;
            levelEl.innerText = `LEVEL: ${level}`;
            comboEl.innerText = combo >= 2 ? `${combo} COMBO` : "";
        }

        // イベント登録
        targetContainer.addEventListener('mousedown', handleInput);
        
        // ステージ外クリックもミス判定にするなら（オプション）
        stage.addEventListener('mousedown', (e) => {
            if(e.target === stage) {
                combo = 0;
                showJudge("MISS", "#ff4757");
                updateUI();
            }
        });

        // 開始
        spawnNext();
    </script>
</body>
</html>
